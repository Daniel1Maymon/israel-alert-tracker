<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tzeva Adom Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;   /* prevent page-level horizontal scroll */
      width: 100%;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .5px; }
    #dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background .3s;
      flex-shrink: 0;
    }
    #dot.connected    { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    #dot.disconnected { background: #f44336; box-shadow: 0 0 6px #f44336; }
    #dot.flash        { background: #ff9800; box-shadow: 0 0 14px #ff9800; }
    #status-text { font-size: .8rem; color: #888; }

    #total { font-size: .8rem; color: #666; }

    /* push total + lang button to the far end */
    #spacer { flex: 1; }

    #lang-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #ccc;
      font-size: .8rem;
      cursor: pointer;
      transition: background .2s;
      flex-shrink: 0;
    }
    #lang-btn:hover { background: #3a3a3a; }

    /* ── flash banner ── */
    #banner {
      display: none;
      padding: 14px 20px;
      font-size: .95rem;
      font-weight: 600;
      text-align: center;
      animation: slidein .2s ease;
      flex-shrink: 0;
    }
    #banner.alert   { background: #b71c1c; color: #fff; }
    #banner.warning { background: #e65100; color: #fff; }
    @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; } }

    /* ── table ── */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 16px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }

    thead th {
      text-align: start;
      padding: 8px 12px;
      color: #666;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 1;
    }
    thead th.num { text-align: end; }

    /* RTL: flip the row accent border */
    [dir="ltr"] tbody tr.ALERT          { border-left:  3px solid #f44336; }
    [dir="ltr"] tbody tr.SYSTEM_MESSAGE { border-left:  3px solid #ff9800; }
    [dir="rtl"] tbody tr.ALERT          { border-right: 3px solid #f44336; }
    [dir="rtl"] tbody tr.SYSTEM_MESSAGE { border-right: 3px solid #ff9800; }

    tbody tr {
      border-bottom: 1px solid #1e1e1e;
      animation: rowin .2s ease;
    }
    @keyframes rowin { from { opacity: 0; background: #2a1a00; } to { opacity: 1; } }
    tbody tr.new-flash { background: #1a1200 !important; }

    td { padding: 10px 12px; vertical-align: top; }

    td.col-num     { color: #555; font-size: .75rem; width: 48px; text-align: end; font-variant-numeric: tabular-nums; }
    td.col-type    { width: 110px; }
    td.col-time    { white-space: nowrap; color: #777; font-size: .78rem; width: 160px; font-variant-numeric: tabular-nums; }
    td.col-elapsed { white-space: nowrap; font-size: .82rem; width: 100px; font-variant-numeric: tabular-nums; font-family: monospace; }
    td.col-source  { white-space: nowrap; width: 90px; font-size: .72rem; }
    .src-tzevaadom { color: #888; }
    .src-oref      { color: #4fc3f7; font-weight: 600; }
    td.col-cities  { color: #ccc; line-height: 1.6; }
    td.col-areas   { font-size: .76rem; color: #888; line-height: 1.6; min-width: 120px; }

    /* Hebrew badge: no uppercase / letter-spacing */
    [dir="rtl"] .badge { text-transform: none; letter-spacing: 0; }

    .badge {
      display: inline-block;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-alert   { background: #f44336; color: #fff; }
    .badge-warning { background: #ff9800; color: #000; }
    .badge-drill   { background: #2196f3; color: #fff; }

[dir="ltr"] tbody tr.is-clear { border-left-color:  #4caf50; }
    [dir="rtl"] tbody tr.is-clear { border-right-color: #4caf50; }
    tbody tr.is-clear td.col-cities .msg-title,
    tbody tr.is-clear td.col-cities .msg-body { color: #81c784; }

    .cities-text { font-size: .82rem; }
    .msg-title   { font-weight: 600; color: #ddd; }
    .msg-body    { font-size: .8rem; color: #999; margin-top: 2px; }

    /* scrollable cities list — row stays compact */
    .cities-scroll {
      max-height: 56px;
      overflow-y: auto;
      font-size: .8rem;
      color: #bbb;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    .cities-scroll::-webkit-scrollbar { width: 4px; }
    .cities-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .city-zone { color: #555; font-size: .75em; }

    /* ── search toolbar ── */
    #toolbar {
      padding: 10px 20px;
      background: #141414;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #search {
      width: 100%;
      max-width: 360px;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: .875rem;
      outline: none;
    }
    #search:focus { border-color: #555; }
    #search::placeholder { color: #555; }

    #no-results { text-align: center; padding: 40px 0; color: #444; display: none; }
    #empty { text-align: center; padding: 60px 0; color: #444; }

    /* ── header credits ── */
    #credits {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      padding: 0 4px;
    }
    #credits a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .75rem;
      color: #999;
      text-decoration: none;
      transition: color .2s;
      white-space: nowrap;
    }
    #credits a:hover { color: #e0e0e0; }
    #credits svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    /* ── area filter bar ── */
    #area-filter {
      padding: 8px 20px;
      background: #141414;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .area-chip {
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #777;
      font-size: .72rem;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    .area-chip:hover { background: #2a2a2a; color: #bbb; border-color: #444; }
    .area-chip.active { background: #2d2d2d; color: #fff; border-color: #777; }

    /* ── area dropdown (mobile only) ── */
    #area-dropdown-wrap {
      display: none;
      padding: 8px 20px;
      background: #141414;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #area-dropdown-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #e0e0e0;
      font-size: .875rem;
      cursor: pointer;
      text-align: start;
      outline: none;
    }
    #area-dropdown-trigger:focus { border-color: #555; }
    #area-dropdown-trigger .chevron { transition: transform .2s; flex-shrink: 0; }
    #area-dropdown-trigger.open { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom-color: #222; }
    #area-dropdown-trigger.open .chevron { transform: rotate(180deg); }

    #area-checklist {
      display: none;
      flex-direction: column;
      max-height: 190px;
      overflow-y: auto;
      border-radius: 0 0 6px 6px;
      border: 1px solid #333;
      border-top: none;
      background: #1e1e1e;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }
    #area-checklist.open { display: flex; }
    #area-checklist::-webkit-scrollbar { width: 4px; }
    #area-checklist::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    .area-check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      font-size: .85rem;
      color: #aaa;
      cursor: pointer;
      border-bottom: 1px solid #252525;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .area-check-item:last-child { border-bottom: none; }
    .area-check-item.checked { color: #fff; background: #2a2a2a; }
    .area-check-item .check-box {
      width: 16px; height: 16px;
      border-radius: 3px;
      border: 1px solid #555;
      background: #1e1e1e;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .area-check-item.checked .check-box {
      background: #555;
      border-color: #777;
    }
    .area-check-item.checked .check-box::after {
      content: '✓';
      font-size: .7rem;
      color: #fff;
      line-height: 1;
    }
    .area-check-all { border-bottom: 1px solid #333 !important; color: #666; font-size: .78rem; }

    @media (max-width: 639px) {
      #area-filter { display: none; }
      #area-dropdown-wrap { display: block; }

      /* header: hide social links to free up space */
      #credits { display: none; }

      /* reduce horizontal padding throughout */
      header { padding: 10px 12px; }
      #toolbar, #area-dropdown-wrap, #shelter-meter { padding: 8px 12px; }
      main { padding: 8px 8px; }

      /* hide low-priority table columns */
      td.col-num,     th.num                       { display: none; }
      td.col-source,  th[data-i18n="col-source"]   { display: none; }
      td.col-areas,   th[data-i18n="col-areas"]    { display: none; }

      /* shrink remaining fixed columns so cities gets the space */
      td.col-type { width: 80px; }
      td.col-time { width: 70px; }

    }

    /* ── shelter meter ── */
    #shelter-meter {
      padding: 10px 20px;
      background: #141414;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .shelter-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-radius: 8px;
    }
    .shelter-card.shelter-in {
      background: rgba(183, 28, 28, 0.18);
      border: 1px solid rgba(244, 67, 54, 0.45);
    }
    .shelter-card.shelter-out {
      background: rgba(27, 94, 32, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.4);
    }
    .shelter-indicator {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .shelter-in .shelter-indicator { background: #f44336; box-shadow: 0 0 8px #f44336; animation: pulse-red 1.5s infinite; }
    .shelter-out .shelter-indicator { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 6px #f44336; }
      50%       { box-shadow: 0 0 14px #f44336; }
    }
    .shelter-info { display: flex; flex-direction: column; gap: 2px; }
    .shelter-status { font-size: .9rem; font-weight: 700; }
    .shelter-in  .shelter-status { color: #ef9a9a; }
    .shelter-out .shelter-status { color: #a5d6a7; }
    .shelter-area { font-size: .73rem; color: #666; }
    .shelter-timer {
      font-size: 1.25rem; font-weight: 700;
      font-family: monospace; font-variant-numeric: tabular-nums;
      letter-spacing: 1px; color: #f44336;
    }
    .shelter-sub { font-size: .73rem; color: #888; }
    .shelter-cards-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* ── pagination ── */
    #pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 10px 20px;
      background: #141414;
      border-top: 1px solid #222;
      flex-shrink: 0;
    }
    .page-btn {
      padding: 4px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background .15s;
      line-height: 1.6;
    }
    .page-btn:hover:not([disabled]) { background: #2a2a2a; border-color: #555; }
    .page-btn[disabled] { color: #333; cursor: default; border-color: #1e1e1e; }
    .page-label { font-size: .8rem; color: #555; }

    /* ── mobile footer credits ── */
    #mobile-footer {
      display: none;   /* hidden on desktop */
      justify-content: center;
      gap: 24px;
      padding: 14px 20px;
      background: #141414;
      border-top: 1px solid #222;
      flex-shrink: 0;
    }
    #mobile-footer a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      color: #888;
      text-decoration: none;
      transition: color .2s;
    }
    #mobile-footer a:hover { color: #e0e0e0; }
    #mobile-footer svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    @media (max-width: 639px) {
      #mobile-footer { display: flex; }
    }
  </style>
</head>
<body>

<header>
  <div id="dot"></div>
  <h1 data-i18n="title">Tzeva Adom Monitor</h1>
  <span id="status-text" data-i18n="connecting">connecting…</span>
  <div id="spacer"></div>
  <span id="total"></span>
  <div id="credits" dir="ltr">

</header>

<div id="banner"></div>

<div id="toolbar">
  <input id="search" type="search" data-i18n-placeholder="search_placeholder" placeholder="Search city…" />
</div>

<div id="area-filter"></div>

<div id="area-dropdown-wrap">
  <button id="area-dropdown-trigger">
    <span id="area-dropdown-label"></span>
    <svg class="chevron" viewBox="0 0 10 6" width="10" height="6" fill="none">
      <path d="M1 1l4 4 4-4" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <div id="area-checklist"></div>
</div>

<div id="shelter-meter" style="display:none"></div>

<main>
  <table id="alerts-table">
    <thead>
      <tr>
        <th class="num">#</th>
        <th data-i18n="col-type">Type</th>
        <th data-i18n="col-cities">Cities / Message</th>
        <th data-i18n="col-areas">Areas</th>
        <th data-i18n="col-time">Time</th>
        <th data-i18n="col-elapsed">Elapsed</th>
        <th data-i18n="col-source">Source</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr id="empty-row">
        <td colspan="7"><div id="empty" data-i18n="waiting">Waiting for alerts…</div></td>
      </tr>
      <tr id="no-results-row" style="display:none">
        <td colspan="7"><div id="no-results" data-i18n="no_results" style="display:block">No matching cities</div></td>
      </tr>
    </tbody>
  </table>
</main>

<div id="pagination"></div>

<script>
  // ── i18n ────────────────────────────────────────────────────────────────
  const I18N = {
    en: {
      title:       'Tzeva Adom Monitor',
      connecting:  'connecting…',
      live:        'Live',
      disconnected:'Disconnected',
      'col-type':  'Type',
      'col-cities':'Cities / Message',
      'col-areas': 'Areas',
      'col-time':  'Time',
      'col-elapsed':'Elapsed',
      'col-source': 'Source',
      all:               'All',
      waiting:           'Waiting for alerts…',
      no_results:        'No matching cities',
      search_placeholder:'Search city…',
      alerts:      (n) => `${n} alert${n !== 1 ? 's' : ''}`,
      badge_alert:  'Alert',
      badge_warning:'Warning',
      badge_drill:  'Drill',
      banner_alert:   (cities) => `🚨 ALERT — ${cities}`,
      banner_warn:    (title)  => `⚠️ ${title || 'System Message'}`,
      msg_key:        { title: 'titleEn', body: 'bodyEn' },
      lang_switch:    'עברית',
      shelter_in:     'In Shelter',
      shelter_out:    'Not in Shelter',
      shelter_total:  'Total shelter time',
    },
    he: {
      title:       'מוניטור צבע אדום',
      connecting:  'מתחבר…',
      live:        'חי',
      disconnected:'מנותק',
      'col-type':  'סוג',
      'col-cities':'ערים / הודעה',
      'col-areas': 'אזורים',
      'col-time':  'שעה',
      'col-elapsed':'זמן שחלף',
      'col-source': 'מקור',
      all:               'הכל',
      waiting:           'ממתין להתרעות…',
      no_results:        'לא נמצאו ערים תואמות',
      search_placeholder:'חיפוש עיר…',
      alerts:      (n) => `${n} התרעות`,
      badge_alert:  'התרעה',
      badge_warning:'אזהרה',
      badge_drill:  'תרגיל',
      banner_alert:   (cities) => `🚨 התרעה — ${cities}`,
      banner_warn:    (title)  => `⚠️ ${title || 'הודעת מערכת'}`,
      msg_key:        { title: 'titleHe', body: 'bodyHe' },
      lang_switch:    'English',
      shelter_in:     'במרחב מוגן',
      shelter_out:    'לא במרחב מוגן',
      shelter_total:  'סה"כ זמן במרחב מוגן',
    },
  };

  let lang = localStorage.getItem('lang') || 'he';
  const t = (key, ...args) => {
    const v = I18N[lang][key];
    return typeof v === 'function' ? v(...args) : v;
  };

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const html       = document.documentElement;
  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('status-text');
  const banner     = document.getElementById('banner');
  const tbody      = document.getElementById('tbody');
  const totalEl    = document.getElementById('total');
  const emptyRow   = document.getElementById('empty-row');
  const langBtn    = document.getElementById('lang-btn');
  const searchEl     = document.getElementById('search');
  const noResultsRow = document.getElementById('no-results-row');
  const areaFilterEl       = document.getElementById('area-filter');
  const areaChecklistEl    = document.getElementById('area-checklist');
  const areaDropdownWrapEl = document.getElementById('area-dropdown-wrap');
  const areaDropdownTrigEl = document.getElementById('area-dropdown-trigger');
  const areaDropdownLblEl  = document.getElementById('area-dropdown-label');
  const shelterMeterEl     = document.getElementById('shelter-meter');

  // ── language switch ──────────────────────────────────────────────────────
  function applyLang() {
    html.lang = lang;
    html.dir  = lang === 'he' ? 'rtl' : 'ltr';
    langBtn.textContent = t('lang_switch');

    // update static i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });

    // update status text
    const cur = dot.className;
    if (cur === 'connected')    statusText.textContent = t('live');
    else if (cur === 'disconnected') statusText.textContent = t('disconnected');
    else statusText.textContent = t('connecting');

    // total is updated by filterAndPage after every render

    // update search placeholder
    searchEl.placeholder = t('search_placeholder');

    // re-render every row's content cell
    tbody.querySelectorAll('tr[data-time]').forEach(tr => {
      renderRowContent(tr, tr._type, tr._data);
    });

    // re-render area chips in new language
    renderAreaChips();

    // refresh shelter meter text in new language
    updateShelterMeter();

    // re-filter with current search term in new language
    filterAndPage(searchEl.value);
  }

  langBtn.addEventListener('click', () => {
    lang = lang === 'en' ? 'he' : 'en';
    localStorage.setItem('lang', lang);
    applyLang();
  });

  // ── elapsed ──────────────────────────────────────────────────────────────
  let counter = 0;
  const elapsedCells = [];

  function pad(n) { return String(n).padStart(2, '0'); }

  function elapsedStr(receivedAt) {
    const secs = Math.max(0, Math.floor((Date.now() - receivedAt) / 1000));
    return `${pad(Math.floor(secs/3600))}:${pad(Math.floor((secs%3600)/60))}:${pad(secs%60)}`;
  }

  function formatDuration(ms) {
    const secs = Math.max(0, Math.floor(ms / 1000));
    return `${pad(Math.floor(secs/3600))}:${pad(Math.floor((secs%3600)/60))}:${pad(secs%60)}`;
  }

  setInterval(() => {
    elapsedCells.forEach(({ el, receivedAt }) => {
      el.textContent = elapsedStr(receivedAt);
    });
    // tick all shelter live timers for areas currently in shelter
    activeAreasEn.forEach(zEn => {
      const s = shelterState.get(zEn);
      if (s && s.inShelter) {
        const timerEl = shelterMeterEl.querySelector(`.shelter-card[data-zone="${zEn}"] .shelter-timer`);
        if (timerEl) timerEl.textContent = formatDuration(totalShelterMs(zEn));
      }
    });
  }, 1000);

  // ── status ───────────────────────────────────────────────────────────────
  function setStatus(s) {
    dot.className = s;
    statusText.textContent = s === 'connected' ? t('live')
                           : s === 'disconnected' ? t('disconnected')
                           : t('connecting');
  }

  // ── banner ───────────────────────────────────────────────────────────────
  function flashBanner(text, type) {
    banner.textContent   = text;
    banner.className     = type;
    banner.style.display = 'block';
    clearTimeout(banner._t);
    banner._t = setTimeout(() => { banner.style.display = 'none'; }, 6000);
  }

  // ── time format ──────────────────────────────────────────────────────────
  function fmt(unixTs) {
    return new Date(Number(unixTs) * 1000)
      .toLocaleString('he-IL', { timeZone: 'Asia/Jerusalem', hour12: false,
        hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ── render the content cell of a row (language-aware) ───────────────────
  function renderRowContent(tr, type, data) {
    const cell      = tr.querySelector('.col-cities');
    const areasCell = tr.querySelector('.col-areas');
    const badge     = tr.querySelector('.badge');

    if (type === 'ALERT') {
      badge.textContent = data.isDrill ? t('badge_drill') : t('badge_alert');
      const names = (data.cities || []).map(name => {
        const c = nameToZone[name];
        const zone = c ? (lang === 'he' ? c.zone : c.zone_en) : null;
        return zone ? `${name} <span class="city-zone">(${zone})</span>` : name;
      }).join(' · ') || '—';
      cell.innerHTML = `<div class="cities-scroll">${names}</div>`;
      tr.dataset.citiesText = (data.cities || []).join(' ').toLowerCase();
      // use server-provided zone_en if already set, fall back to client-side resolution
      if (!tr.dataset.areaEn) tr.dataset.areaEn = getZoneEns(type, data).join('|');
      const alertZoneEns = (tr.dataset.areaEn || '').split('|').filter(Boolean);
      areasCell.textContent = alertZoneEns.map(z => lang === 'he' ? (zoneEnToZoneHe[z] || z) : z).join(' · ');
      updateKnownAreas(alertZoneEns);
    } else {
      const isClear = (data.titleHe || '').includes('יציאה מהמרחב המוגן')
                   || (data.bodyHe  || '').includes('יציאה מהמרחב המוגן')
                   || (data.titleHe || '').includes('סיום אירוע')
                   || (data.titleEn || '').toLowerCase().includes('leaving the protected space')
                   || (data.bodyEn  || '').toLowerCase().includes('leaving the protected space')
                   || (data.titleEn || '').toLowerCase().includes('incident ended');
      tr.classList.toggle('is-clear', isClear);
      badge.className = 'badge badge-warning';
      badge.textContent = t('badge_warning');

      const titleKey  = I18N[lang].msg_key.title;
      const cityIds   = typeof data.citiesIds === 'string'
                          ? JSON.parse(data.citiesIds) : (data.citiesIds || []);
      const cityNames = resolveCityIds(cityIds);
      cell.innerHTML = `<span class="msg-title">${data[titleKey] || ''}</span>
                        ${cityNames ? `<div class="cities-scroll" style="margin-top:4px">${cityNames}</div>` : ''}`;
      tr.dataset.citiesText = cityNames.toLowerCase();
      // use server-provided zone_en if already set, fall back to client-side resolution
      if (!tr.dataset.areaEn) tr.dataset.areaEn = getZoneEns(type, data).join('|');
      const sysZoneEns = (tr.dataset.areaEn || '').split('|').filter(Boolean);
      areasCell.textContent = sysZoneEns.map(z => lang === 'he' ? (zoneEnToZoneHe[z] || z) : z).join(' · ');
      updateKnownAreas(sysZoneEns);
    }
  }

  // ── add row ──────────────────────────────────────────────────────────────
  const receivedIds = new Set();   // dedup across SSE + polling
  let _batchMode = false;          // true during initial bulk history load; defers sort+filter

  function addRow(type, data, isLive = true, source = 'tzevaadom', zoneEnStr = '') {
    // dedup: same event can arrive via SSE and then again via the next poll
    const nid = data.notificationId;
    if (nid) {
      if (receivedIds.has(String(nid))) return;
      receivedIds.add(String(nid));
    }

    emptyRow.style.display = 'none';
    counter++;

    const isDrill    = type === 'ALERT' && data.isDrill;
    const badgeClass = isDrill ? 'badge-drill' : type === 'ALERT' ? 'badge-alert' : 'badge-warning';
    const receivedAt = Number(data.time) * 1000;

    const tr = document.createElement('tr');
    tr.className    = type;
    tr.dataset.time = Number(data.time);
    tr._type        = type;
    tr._data        = data;
    if (zoneEnStr) tr.dataset.areaEn = zoneEnStr;   // set before renderRowContent

    tr.innerHTML = `
      <td class="col-num">${counter}</td>
      <td class="col-type"><span class="badge ${badgeClass}"></span></td>
      <td class="col-cities"></td>
      <td class="col-areas"></td>
      <td class="col-time">${fmt(data.time)}</td>
      <td class="col-elapsed"></td>
      <td class="col-source"><span class="src-${source}">${source}</span></td>`;

    renderRowContent(tr, type, data);

    // for live events touching an active area, re-fetch server shelter state
    if (isLive) {
      const eventZoneEns = (tr.dataset.areaEn || '').split('|').filter(Boolean);
      if (eventZoneEns.some(z => activeAreasEn.has(z))) fetchShelterState();
    }

    const elCell = tr.querySelector('.col-elapsed');
    elCell.textContent = elapsedStr(receivedAt);
    elapsedCells.push({ el: elCell, receivedAt });

    tbody.appendChild(tr);
    if (!_batchMode) {
      sortTable();
      if (isLive) currentPage = 1;
      filterAndPage(searchEl.value);
    }

    if (isLive) {
      dot.classList.add('flash');
      setTimeout(() => dot.classList.remove('flash'), 800);
      tr.classList.add('new-flash');
      setTimeout(() => tr.classList.remove('new-flash'), 1200);

      if (type === 'ALERT' && !isDrill)
        flashBanner(t('banner_alert', (data.cities || []).slice(0, 4).join(', ')), 'alert');
      else if (type === 'SYSTEM_MESSAGE')
        flashBanner(t('banner_warn', data[I18N[lang].msg_key.title]), 'warning');
    }
  }

  // ── search + pagination ───────────────────────────────────────────────────
  const MOBILE_MAX = 10;   // max events shown on mobile
  let currentPage = 1;

  function isMobileView() {
    return window.matchMedia('(max-width: 639px)').matches;
  }

  function filterAndPage(query) {
    const q = query.trim().toLowerCase();
    const allRows = [...tbody.querySelectorAll('tr[data-time]')];
    const mobile   = isMobileView();
    const pageSize = mobile ? 1 : 10;

    const matching = allRows.filter(tr => {
      const textMatch = !q || (tr.dataset.citiesText || '').includes(q);
      const areaMatch = activeAreasEn.size === 0 ||
        (tr.dataset.areaEn || '').split('|').some(z => activeAreasEn.has(z));
      return textMatch && areaMatch;
    });

    // on mobile cap to the MOBILE_MAX most-recent events
    const visible = mobile ? matching.slice(0, MOBILE_MAX) : matching;

    const totalPages = Math.max(1, Math.ceil(visible.length / pageSize));
    currentPage = Math.min(currentPage, totalPages);

    const start   = (currentPage - 1) * pageSize;
    const pageSet = new Set(visible.slice(start, start + pageSize));
    allRows.forEach(tr => { tr.style.display = pageSet.has(tr) ? '' : 'none'; });

    noResultsRow.style.display = matching.length === 0 ? '' : 'none';
    renderPagination(visible.length, totalPages, pageSize);
  }

  function renderPagination(total, totalPages, pageSize) {
    const el = document.getElementById('pagination');
    if (total <= pageSize) { el.innerHTML = ''; return; }

    const label = lang === 'he'
      ? `עמוד ${currentPage} מתוך ${totalPages} (${total} תוצאות)`
      : `Page ${currentPage} of ${totalPages} (${total} results)`;

    el.innerHTML = `
      <button class="page-btn" id="page-prev" ${currentPage === 1 ? 'disabled' : ''}>&#8249;</button>
      <span class="page-label">${label}</span>
      <button class="page-btn" id="page-next" ${currentPage === totalPages ? 'disabled' : ''}>&#8250;</button>`;

    if (currentPage > 1)
      document.getElementById('page-prev').addEventListener('click', () => { currentPage--; filterAndPage(searchEl.value); });
    if (currentPage < totalPages)
      document.getElementById('page-next').addEventListener('click', () => { currentPage++; filterAndPage(searchEl.value); });
  }

  searchEl.addEventListener('input', () => {
    localStorage.setItem('search', searchEl.value);
    currentPage = 1;
    filterAndPage(searchEl.value);
  });

  // ── sort ─────────────────────────────────────────────────────────────────
  function sortTable() {
    const rows = [...tbody.querySelectorAll('tr[data-time]')];
    rows.sort((a, b) => Number(b.dataset.time) - Number(a.dataset.time));
    rows.forEach(r => tbody.appendChild(r));
  }

  // ── city lookup ──────────────────────────────────────────────────────────
  let cityLookup   = {};   // "id"          -> {name, name_en, zone, zone_en, ...}
  let nameToZone   = {};   // hebrew name   -> city record
  let zoneEnToZoneHe = {}; // zone_en       -> zone (Hebrew)

  fetch('/cities')
    .then(r => r.json())
    .then(data => {
      cityLookup = data;
      nameToZone = {};
      zoneEnToZoneHe = {};
      Object.values(data).forEach(c => {
        if (c.name  && c.zone_en) nameToZone[c.name] = c;
        if (c.zone_en && c.zone)  zoneEnToZoneHe[c.zone_en] = c.zone;
      });
      // Re-render any rows that arrived before city data was ready
      tbody.querySelectorAll('tr[data-time]').forEach(tr => {
        renderRowContent(tr, tr._type, tr._data);
      });
      // Fetch server-computed shelter state for pre-selected areas
      fetchShelterState();
      fetchCount();
    });

  // Returns stable English zone names for a row (used for filtering & knownAreas).
  function getZoneEns(type, data) {
    const zones = new Set();
    if (type === 'ALERT') {
      (data.cities || []).forEach(name => {
        const c = nameToZone[name];
        if (c) zones.add(c.zone_en);
      });
    } else {
      const ids = typeof data.citiesIds === 'string'
        ? JSON.parse(data.citiesIds) : (data.citiesIds || []);
      ids.forEach(id => {
        const c = cityLookup[String(id)];
        if (c && c.zone_en) zones.add(c.zone_en);
      });
    }
    return [...zones];
  }

  // Returns display text in current language.
  function getZones(type, data) {
    return getZoneEns(type, data)
      .map(z => lang === 'he' ? (zoneEnToZoneHe[z] || z) : z)
      .join(' · ');
  }

  // ── area filter ──────────────────────────────────────────────────────────
  let activeAreasEn = new Set(JSON.parse(localStorage.getItem('activeAreasEn') || '["Dan"]'));
  let knownAreas    = new Map();   // zone_en -> {zone_en, zone}

  function renderAreaChips() {
    areaFilterEl.innerHTML = '';
    if (knownAreas.size === 0) { renderAreaDropdown(); return; }

    const allChip = document.createElement('button');
    allChip.className = 'area-chip' + (activeAreasEn.size === 0 ? ' active' : '');
    allChip.textContent = t('all');
    allChip.addEventListener('click', () => toggleArea(null));
    areaFilterEl.appendChild(allChip);

    const sorted = [...knownAreas.values()].sort((a, b) =>
      (lang === 'he' ? a.zone : a.zone_en).localeCompare(lang === 'he' ? b.zone : b.zone_en)
    );
    sorted.forEach(area => {
      const chip = document.createElement('button');
      chip.className = 'area-chip' + (activeAreasEn.has(area.zone_en) ? ' active' : '');
      chip.textContent = lang === 'he' ? area.zone : area.zone_en;
      chip.addEventListener('click', () => toggleArea(area.zone_en));
      areaFilterEl.appendChild(chip);
    });

    renderAreaDropdown();
  }

  function updateDropdownLabel() {
    if (activeAreasEn.size === 0) {
      areaDropdownLblEl.textContent = t('all');
    } else if (activeAreasEn.size === 1) {
      const zEn = [...activeAreasEn][0];
      const area = knownAreas.get(zEn);
      areaDropdownLblEl.textContent = area ? (lang === 'he' ? area.zone : area.zone_en) : zEn;
    } else {
      areaDropdownLblEl.textContent = lang === 'he'
        ? `${activeAreasEn.size} אזורים נבחרו`
        : `${activeAreasEn.size} areas selected`;
    }
  }

  areaDropdownTrigEl.addEventListener('click', () => {
    const open = areaChecklistEl.classList.toggle('open');
    areaDropdownTrigEl.classList.toggle('open', open);
  });

  document.addEventListener('click', (e) => {
    if (!areaDropdownWrapEl.contains(e.target)) {
      areaChecklistEl.classList.remove('open');
      areaDropdownTrigEl.classList.remove('open');
    }
  });

  function renderAreaDropdown() {
    areaChecklistEl.innerHTML = '';

    const allItem = document.createElement('div');
    allItem.className = 'area-check-item area-check-all' + (activeAreasEn.size === 0 ? ' checked' : '');
    allItem.innerHTML = `<div class="check-box"></div><span>${t('all')}</span>`;
    allItem.addEventListener('click', () => toggleArea(null));
    areaChecklistEl.appendChild(allItem);

    const sorted = [...knownAreas.values()].sort((a, b) =>
      (lang === 'he' ? a.zone : a.zone_en).localeCompare(lang === 'he' ? b.zone : b.zone_en)
    );
    sorted.forEach(area => {
      const item = document.createElement('div');
      item.className = 'area-check-item' + (activeAreasEn.has(area.zone_en) ? ' checked' : '');
      item.innerHTML = `<div class="check-box"></div><span>${lang === 'he' ? area.zone : area.zone_en}</span>`;
      item.addEventListener('click', () => toggleArea(area.zone_en));
      areaChecklistEl.appendChild(item);
    });

    updateDropdownLabel();
  }

  function toggleArea(zoneEn) {
    if (zoneEn === null) {
      activeAreasEn.clear();
    } else if (activeAreasEn.has(zoneEn)) {
      activeAreasEn.delete(zoneEn);
    } else {
      activeAreasEn.add(zoneEn);
    }
    localStorage.setItem('activeAreasEn', JSON.stringify([...activeAreasEn]));
    renderAreaChips();
    fetchShelterState();   // fetch server-computed intervals for the new selection
    fetchCount();
    currentPage = 1;
    filterAndPage(searchEl.value);
  }

  function updateKnownAreas(zoneEns) {
    let changed = false;
    zoneEns.forEach(zEn => {
      const heZone = zoneEnToZoneHe[zEn] || null;
      if (!knownAreas.has(zEn)) {
        knownAreas.set(zEn, { zone_en: zEn, zone: heZone || zEn });
        changed = true;
      } else if (heZone) {
        // Cities may have loaded after this zone was first inserted with an English fallback — update it
        const existing = knownAreas.get(zEn);
        if (existing.zone === zEn) { existing.zone = heZone; changed = true; }
      }
    });
    if (changed) renderAreaChips();
  }

  // ── shelter state machine ─────────────────────────────────────────────────
  // Map: zone_en → {
  //   inShelter: bool,
  //   shelterStartMs: number|null,   — start of the current open period
  //   intervals: [{start, end}],     — all completed shelter periods (ms)
  // }
  // Storing raw intervals allows future filtering by any time window (last 1h, 6h, etc.)
  const shelterState = new Map();

  // Returns total ms in shelter within [from, to].
  // Call with no args for all-time total. Pass from/to (ms) for any time window.
  function totalShelterMs(zEn, from = 0, to = Infinity) {
    const s = shelterState.get(zEn);
    if (!s) return 0;
    let total = 0;
    for (const iv of s.intervals) {
      const ivStart = Math.max(iv.start, from);
      const ivEnd   = Math.min(iv.end,   to);
      if (ivEnd > ivStart) total += ivEnd - ivStart;
    }
    if (s.inShelter && s.shelterStartMs !== null) {
      const ivStart = Math.max(s.shelterStartMs, from);
      const ivEnd   = Math.min(Date.now(),        to);
      if (ivEnd > ivStart) total += ivEnd - ivStart;
    }
    return total;
  }

  // Fetch pre-computed shelter state from server for all currently active areas.
  // Falls back to updateShelterMeter() on error (shows whatever is in local shelterState).
  function fetchCount() {
    const zonesParam = activeAreasEn.size > 0 ? [...activeAreasEn].join('|') : '';
    const url = zonesParam ? `/count?zones=${encodeURIComponent(zonesParam)}` : '/count';
    fetch(url)
      .then(r => r.json())
      .then(d => { totalEl.textContent = t('alerts', d.count); })
      .catch(() => {});
  }

  function fetchShelterState() {
    if (activeAreasEn.size === 0) { updateShelterMeter(); return; }
    const zonesParam = [...activeAreasEn].join('|');
    fetch(`/shelter?zones=${encodeURIComponent(zonesParam)}`)
      .then(r => r.json())
      .then(serverData => {
        Object.entries(serverData).forEach(([zEn, state]) => {
          shelterState.set(zEn, {
            inShelter:      state.inShelter,
            shelterStartMs: state.shelterStartMs,
            intervals:      state.intervals,
          });
        });
        updateShelterMeter();
      })
      .catch(() => updateShelterMeter());
  }

  function shelterCardHTML(zEn) {
    const s        = shelterState.get(zEn);
    const areaName = lang === 'he' ? (zoneEnToZoneHe[zEn] || zEn) : zEn;
    const inShelter = s && s.inShelter;
    const total     = totalShelterMs(zEn);

    const timerHTML = total > 0 || inShelter
      ? `<div class="shelter-sub">${t('shelter_total')}</div>
         <div class="shelter-timer">${formatDuration(total)}</div>`
      : '';

    return `<div class="shelter-card ${inShelter ? 'shelter-in' : 'shelter-out'}" data-zone="${zEn}">
      <div class="shelter-indicator"></div>
      <div class="shelter-info">
        <div class="shelter-status">${t(inShelter ? 'shelter_in' : 'shelter_out')}</div>
        <div class="shelter-area">${areaName}</div>
        ${timerHTML}
      </div>
    </div>`;
  }

  function updateShelterMeter() {
    if (activeAreasEn.size === 0) {
      shelterMeterEl.style.display = 'none';
      shelterMeterEl.innerHTML = '';
      return;
    }
    shelterMeterEl.style.display = 'block';
    shelterMeterEl.innerHTML =
      `<div class="shelter-cards-wrap">${[...activeAreasEn].map(shelterCardHTML).join('')}</div>`;
  }

  function resolveCityIds(ids) {
    return (ids || []).map(id => {
      const c = cityLookup[String(id)];
      if (!c) return null;   // ID not in our dataset — skip silently
      const name = lang === 'he' ? c.name : c.name_en;
      const zone = lang === 'he' ? c.zone : c.zone_en;
      return zone ? `${name} <span class="city-zone">(${zone})</span>` : name;
    }).filter(Boolean).join(' · ');
  }

  // ── polling ──────────────────────────────────────────────────────────────
  let latestTime    = 0;
  let historyLoaded = false;  // true only after the first full history poll completes

  function poll() {
    const url = latestTime ? `/history?since=${latestTime}` : '/history';
    fetch(url)
      .then(r => {
        setStatus('connected');
        return r.json();
      })
      .then(rows => {
        const isNew = historyLoaded;   // never live until first load is done
        const isBatch = !historyLoaded && rows.length > 1;
        if (isBatch) _batchMode = true;
        rows.forEach(r => {
          try {
            const raw = JSON.parse(r.raw_data);
            addRow(raw.type, raw.data, isNew, raw.source || r.source || 'tzevaadom', r.zone_en || '');
            if (Number(raw.data.time) > latestTime)
              latestTime = Number(raw.data.time);
          } catch {}
        });
        if (isBatch) {
          _batchMode = false;
          sortTable();
          filterAndPage(searchEl.value);
        }
        if (!historyLoaded) {
          historyLoaded = true;
          if (!latestTime && rows.length)
            latestTime = Math.max(...rows.map(r => {
              try { return Number(JSON.parse(r.raw_data).data.time); } catch { return 0; }
            }));
          fetchShelterState();   // initial shelter state from server after history loads
          fetchCount();
        }
      })
      .catch(() => setStatus('disconnected'));
  }

  // ── SSE — live push for new events ───────────────────────────────────────
  const evtSource = new EventSource('/stream');
  evtSource.onmessage = (e) => {
    try {
      const payload = JSON.parse(e.data);
      if (payload.type === 'STATUS') {
        setStatus(payload.data.status === 'connected' ? 'connected' : 'disconnected');
        return;
      }
      // don't process live events until the full history is loaded
      if (!historyLoaded) return;
      if (payload.type === 'ALERT' || payload.type === 'SYSTEM_MESSAGE') {
        addRow(payload.type, payload.data, true, payload.source || 'tzevaadom', payload.zone_en || '');
        if (Number(payload.data.time) > latestTime)
          latestTime = Number(payload.data.time);
      }
    } catch {}
  };
  evtSource.onerror = () => setStatus('disconnected');

  // ── restore state & apply lang on init ──────────────────────────────────
  const savedSearch = localStorage.getItem('search') || '';
  if (savedSearch) searchEl.value = savedSearch;
  applyLang();

  poll();                          // load full history immediately
  setInterval(poll, 2000);         // poll every 2s as SSE fallback
</script>
</body>
</html>
